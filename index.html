<!DOCTYPE html>
<html>
<head>
    <title>TRC Price Chart</title>

    <!-- Trading Chart -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

    <!-- Ethers -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial;
        }

        #chart {
            width: 100%;
            height: 100vh;
        }

        .title {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="title">TRC Live Price Chart (Polygon)</div>
<div id="chart"></div>

<script>
// ================= CONFIG =================
const RPC = "https://rpc.ankr.com/polygon"; // ✅ Stable RPC
const CONTRACT = "0x928D3aDE2713AD049b2123988f459F407E9C935e";

// ABI (minimal)
const ABI = [
    "function usdPrice() view returns (uint256)",
    "event BuyWithPOL(address indexed user, uint256 polAmount, uint256 tokensReceived)",
    "event BuyWithUSDT(address indexed user, uint256 usdtAmount, uint256 tokensReceived)",
    "event SellForPOL(address indexed user, uint256 tokensSold, uint256 polReceived)",
    "event SellForUSDT(address indexed user, uint256 tokensSold, uint256 usdtReceived)"
];

// ================= SETUP =================
const provider = new ethers.JsonRpcProvider(RPC);
const contract = new ethers.Contract(CONTRACT, ABI, provider);

// ================= CHART =================
const chart = LightweightCharts.createChart(document.getElementById("chart"), {
    width: window.innerWidth,
    height: window.innerHeight,
    layout: {
        background: { color: "#0f172a" },
        textColor: "#ffffff"
    },
    grid: {
        vertLines: { color: "#1e293b" },
        horzLines: { color: "#1e293b" }
    }
});

// ✅ correct API
const lineSeries = chart.addSeries(LightweightCharts.LineSeries);

// ================= STATE =================
let history = [];
let currentPrice = 150;

// helper
function toNum(x, decimals=18) {
    return Number(x) / (10 ** decimals);
}

// ================= LOAD HISTORY =================
async function loadHistory() {
    try {
        console.log("Loading history...");

        const buys = await contract.queryFilter("BuyWithPOL", 0, "latest");

        console.log("Events found:", buys.length);

        if (buys.length === 0) {
            // fallback show current price
            const price = await contract.usdPrice();

            lineSeries.setData([{
                time: Math.floor(Date.now() / 1000),
                value: Number(price) / 1e18
            }]);

            return;
        }

        // only last 50 events (fast load)
        const recent = buys.slice(-50);

        for (let e of recent) {
            const block = await provider.getBlock(e.blockNumber);

            // simulate price move
            currentPrice += 0.5;

            history.push({
                time: block.timestamp,
                value: currentPrice
            });
        }

        lineSeries.setData(history);

    } catch (err) {
        console.error("History error:", err);
    }
}

// ================= LIVE PRICE =================
async function updateLive() {
    try {
        const price = await contract.usdPrice();

        const point = {
            time: Math.floor(Date.now() / 1000),
            value: Number(price) / 1e18
        };

        lineSeries.update(point);

    } catch (err) {
        console.error("Live error:", err);
    }
}

// ================= EVENTS =================
function listenEvents() {
    contract.on("BuyWithPOL", updateLive);
    contract.on("SellForPOL", updateLive);
    contract.on("BuyWithUSDT", updateLive);
    contract.on("SellForUSDT", updateLive);
}

// ================= INIT =================
async function init() {
    console.log("Init...");

    // test connection
    try {
        const testPrice = await contract.usdPrice();
        console.log("Contract working, price:", Number(testPrice)/1e18);
    } catch (e) {
        console.error("RPC/Contract error:", e);
    }

    await loadHistory();

    listenEvents();

    // fallback update every 1 min
    setInterval(updateLive, 60000);
}

init();

// resize fix
window.addEventListener("resize", () => {
    chart.applyOptions({
        width: window.innerWidth,
        height: window.innerHeight
    });
});
</script>

</body>
</html>
